name: Bug 报告
description: 报告可复现的问题
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: 感谢你帮助改进 Madedown。
  - type: input
    id: version
    attributes:
      label: Madedown 版本
      placeholder: 例如 1.1.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS 版本与 Mac 型号
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: 请按顺序列出操作步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 截图、日志或补充信息
