name: 功能建议
description: 建议一个符合轻量编辑器定位的改进
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你期待怎样的交互？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过哪些替代方案？
