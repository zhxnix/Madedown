name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Swift version
        run: swift --version

      - name: Build release
        run: swift build -c release

      - name: Run self-tests
        run: swift run Madedown --self-test

      - name: Audit open-source contents
        run: ./Scripts/audit_open_source.sh
